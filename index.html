<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Regalo Especial para Valeri</title>
    <style>
        /* --- ESTILOS GENERALES Y FONDO ROSA --- */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* SECCIÓN ACTUALIZADA: Fondo rosa sólido suave y limpio */
            background-color: #ffe0f0; 
            /* ------------------------------------------- */
            overflow: hidden; /* Evita barras de desplazamiento */
            cursor: pointer; /* Indica que la página es interactiva */
        }

        /* --- ESTILOS DEL REGALO CERRADO --- */
        #regalo-container {
            text-align: center;
            transition: opacity 1s ease-in-out;
        }

        .caja-regalo {
            width: 150px;
            height: 150px;
            background-color: #ff69b4; /* Rosa más intenso para el regalo */
            border-radius: 10px;
            position: relative;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: white;
            font-weight: bold;
        }

        .caja-regalo::before { /* Cinta del regalo */
            content: '';
            position: absolute;
            width: 20px;
            height: 100%;
            background-color: white;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .caja-regalo::after { /* Moño del regalo */
            content: '🎀';
            position: absolute;
            font-size: 3em;
            top: -40px;
        }

        #mensaje-inicial {
            color: #d81b60;
            font-weight: bold;
            font-size: 1.2em;
            margin: 0;
        }

        /* --- ESTILOS DEL CONTENIDO SORPRESA (Oculto inicialmente) --- */
        #contenido-sorpresa {
            display: none;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            width: 90%;
            max-width: 600px;
        }

        /* Mensaje Personalizado */
        .mensaje-amor {
            font-family: 'Georgia', serif; /* Tipografía más elegante */
            font-size: 2.5em;
            color: white; /* Texto blanco sobre fondo rosa */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            margin-top: 0;
            line-height: 1.3;
        }

        /* --- ESTILOS DEL RAMO DE FLORES DIBUJADO --- */
        .ramo-flores {
            position: relative;
            width: 250px;
            height: 300px;
            margin: 0 auto 30px;
            /* Animación de balanceo suave */
            animation: balanceo_ramo 5s ease-in-out infinite;
        }

        @keyframes balanceo_ramo {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(3deg); }
        }

        /* Tallos */
        .tallos {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 150px;
            background-color: #2e8b57; /* Verde mar */
            border-radius: 5px;
        }
        .tallos::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 100%;
            background-color: rgba(0,0,0,0.1);
            left: 3px;
        }

        /* El Ramo (Contenedor de flores) */
        .flores-container {
            position: absolute;
            top: 0;
            width: 100%;
            height: 200px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
        }

        /* Estilo base de una flor (Pétalos) */
        .flor {
            position: relative;
            width: 60px;
            height: 60px;
            background-color: #ffd700; /* Dorado/Amarillo Intenso */
            border-radius: 50%;
            margin: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Centro de la flor */
        .centro-flor {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            background-color: #b8860b; /* Marrón oscuro/Dorado */
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Pétalos (Dibujados con pseudos) */
        .flor::before, .flor::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 10px;
            width: 40px;
            height: 60px;
            background-color: #ffd700;
            border-radius: 50%;
            transform: rotate(-30deg);
        }
        .flor::after {
            top: -15px;
            left: auto;
            right: 10px;
            transform: rotate(30deg);
        }
        
        /* Adornos (Puntitos) */
        .adornos-flor {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            animation: rotacion_flores 10s linear infinite;
        }
        .adornos-flor::before {
            content: '✨';
            position: absolute;
            top: -10px;
            left: 10px;
            font-size: 1.2rem;
            color: white;
            opacity: 0.8;
        }

        @keyframes rotacion_flores {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- PIE DE PÁGINA CON EL NOMBRE --- */
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.1em;
            color: #d81b60;
            font-weight: bold;
            display: none; /* Se oculta al principio */
        }

        /* --- ANIMACIONES DE FONDO (Corazones y Estrellas) --- */
        .corazon, .estrella {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.7;
            animation: flotar 5s linear infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body onclick="abrirRegalo()">

    <div id="regalo-container">
        <div class="caja-regalo">
            Haz clic
        </div>
        <p id="mensaje-inicial">Tengo una sorpresa para ti...</p>
    </div>

    <div id="contenido-sorpresa">
        <h1 class="mensaje-amor">Te quiero mucho mi reina hermosa preciosa</h1>
        
        <div class="ramo-flores">
            <div class="tallos"></div>
            <div class="flores-container">
                <div class="flor">
                    <div class="adornos-flor"></div>
                    <div class="centro-flor"></div>
                </div>
                <div class="flor">
                    <div class="centro-flor"></div>
                </div>
                <div class="flor">
                    <div class="adornos-flor"></div>
                    <div class="centro-flor"></div>
                </div>
                <div class="flor">
                    <div class="centro-flor"></div>
                </div>
                <div class="flor">
                    <div class="adornos-flor"></div>
                    <div class="centro-flor"></div>
                </div>
            </div>
        </div>
    </div>

    <footer id="pie-pagina">
        Para Valeri Villadiego
    </footer>

    <script>
        function abrirRegalo() {
            // 1. Ocultar el regalo inicial
            document.getElementById('regalo-container').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('regalo-container').style.display = 'none';
            }, 1000); // Esperar a que termine la animación de opacidad

            // 2. Mostrar el contenido sorpresa
            setTimeout(function() {
                var contenido = document.getElementById('contenido-sorpresa');
                contenido.style.display = 'block';
                setTimeout(function() {
                    contenido.style.opacity = '1';
                }, 100); // Pequeño retraso para la transición de opacidad

                // 3. Mostrar el pie de página
                document.getElementById('pie-pagina').style.display = 'block';

                // 4. Activar animaciones de fondo
                crearCorazonesYEstrellas();
            }, 1100); // Comenzar a mostrar el contenido justo después de ocultar el regalo

            // Desactivar el clic en el body para que no se repita
            document.body.onclick = null;
            document.body.style.cursor = 'default';
        }

        function crearCorazonesYEstrellas() {
            const container = document.body;
            const elementTypes = ['❤️', '⭐', '✨', '💖'];

            for (let i = 0; i < 30; i++) {
                const element = document.createElement('div');
                element.classList.add('corazon'); // O 'estrella', la animación es la misma
                element.innerText = elementTypes[Math.floor(Math.random() * elementTypes.length)];
                element.style.left = Math.random() * 100 + 'vw';
                element.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(element);
            }
        }
    </script>
</body>
</html>
