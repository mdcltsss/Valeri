<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Regalo Especial para Valeri</title>
    <style>
        /* Estilos Generales y Fondo Rosa */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffe0f0; /* Fondo rosa suave */
            overflow: hidden; /* Evita barras de desplazamiento durante animaciones */
            cursor: pointer; /* Indica que la página es interactiva */
        }

        /* Estilo para el Regalo Virtual (Cerrado) */
        #regalo-container {
            text-align: center;
            transition: opacity 1s ease-in-out;
        }

        .caja-regalo {
            width: 150px;
            height: 150px;
            background-color: #ff69b4; /* Rosa más intenso para el regalo */
            border-radius: 10px;
            position: relative;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: white;
            font-weight: bold;
        }

        .caja-regalo::before { /* Cinta del regalo */
            content: '';
            position: absolute;
            width: 20px;
            height: 100%;
            background-color: white;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .caja-regalo::after { /* Moño del regalo */
            content: '🎀';
            position: absolute;
            font-size: 3em;
            top: -40px;
        }

        #mensaje-inicial {
            color: #d81b60;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Estilos para el Contenido Sorpresa (Oculto inicialmente) */
        #contenido-sorpresa {
            display: none;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            width: 90%;
            max-width: 600px;
        }

        /* Arreglo de Flores Amarillas (Imagen) */
        .flores-amarillas {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* Mensaje Personalizado */
        .mensaje-amor {
            font-family: 'Georgia', serif; /* Tipografía más elegante */
            font-size: 2.5em;
            color: white; /* Texto blanco sobre fondo rosa */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            line-height: 1.3;
        }

        /* Pie de Página con el Nombre */
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.1em;
            color: #d81b60;
            display: none; /* Se oculta al principio */
        }

        /* Animaciones de Fondo (Corazones y Estrellas) */
        .corazon, .estrella {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.7;
            animation: flotar 5s linear infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body onclick="abrirRegalo()">

    <div id="regalo-container">
        <div class="caja-regalo">
            Haz clic
        </div>
        <p id="mensaje-inicial">Tengo una sorpresa para ti...</p>
    </div>

    <div id="contenido-sorpresa">
        <h1 class="mensaje-amor">Te quiero mucho mi reina hermosa preciosa</h1>
        
        <img src="https://images.pexels.com/photos/1036371/pexels-photo-1036371.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="Arreglo de Flores Amarillas" class="flores-amarillas">

        </div>

    <footer id="pie-pagina">
        Para Valeri Villadiego
    </footer>

    <script>
        function abrirRegalo() {
            // 1. Ocultar el regalo inicial
            document.getElementById('regalo-container').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('regalo-container').style.display = 'none';
            }, 1000); // Esperar a que termine la animación de opacidad

            // 2. Mostrar el contenido sorpresa
            setTimeout(function() {
                var contenido = document.getElementById('contenido-sorpresa');
                contenido.style.display = 'block';
                setTimeout(function() {
                    contenido.style.opacity = '1';
                }, 100); // Pequeño retraso para la transición de opacidad

                // 3. Mostrar el pie de página
                document.getElementById('pie-pagina').style.display = 'block';

                // 4. Activar animaciones de fondo
                crearCorazonesYEstrellas();
            }, 1100); // Comenzar a mostrar el contenido justo después de ocultar el regalo

            // Desactivar el clic en el body para que no se repita
            document.body.onclick = null;
            document.body.style.cursor = 'default';
        }

        function crearCorazonesYEstrellas() {
            const container = document.body;
            const elementTypes = ['❤️', '⭐', '✨', '💖'];

            for (let i = 0; i < 30; i++) {
                const element = document.createElement('div');
                element.classList.add('corazon'); // O 'estrella', la animación es la misma
                element.innerText = elementTypes[Math.floor(Math.random() * elementTypes.length)];
                element.style.left = Math.random() * 100 + 'vw';
                element.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(element);
            }
        }
    </script>
</body>
</html>
